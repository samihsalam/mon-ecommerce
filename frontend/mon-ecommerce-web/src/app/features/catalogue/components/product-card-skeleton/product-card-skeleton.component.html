<!-- aria-hidden: a loading placeholder has no content a screen reader should announce; the
     results-counter's aria-live region already communicates the loading state. -->
<div aria-hidden="true" class="animate-pulse">
  <div class="aspect-[3/4] w-full rounded-card bg-bg-secondary"></div>
  <div class="mt-3 space-y-2">
    <div class="h-4 w-3/4 rounded bg-bg-secondary"></div>
    <div class="h-3 w-1/2 rounded bg-bg-secondary"></div>
  </div>
</div>
