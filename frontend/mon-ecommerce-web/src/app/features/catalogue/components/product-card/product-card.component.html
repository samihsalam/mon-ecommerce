<!--
  role="article" lives on the outer, non-interactive wrapper — NOT on the <a> itself. Overriding
  an anchor's implicit "link" role with "article" would strip its link semantics from assistive
  tech (no longer announced/reachable as a link), which is the opposite of AC #8's "focus ring on
  all interactive elements" intent. The <a> keeps its native role/focusability; the wrapper
  supplies the labeled article region AC #7 asks for.
-->
<div role="article" [attr.aria-label]="ariaLabel()" class="group">
  <a
    [routerLink]="['/produits', product.id]"
    class="block focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent focus-visible:ring-offset-2 rounded-card"
  >
    <div class="aspect-[3/4] w-full overflow-hidden rounded-card bg-bg-secondary">
      @if (product.imageUrl) {
        <img
          [src]="product.imageUrl"
          [alt]="product.name"
          loading="lazy"
          class="h-full w-full object-cover transition group-hover:scale-105"
        />
      } @else {
        <div class="flex h-full w-full items-center justify-center text-text-secondary text-sm">Pas d'image</div>
      }
    </div>

    <div class="mt-3">
      <p class="font-semibold text-text line-clamp-2">{{ product.name }}</p>
      @if (product.material) {
        <p class="text-sm text-text-secondary">{{ product.material }}</p>
      }
      <p class="mt-1 text-text">{{ formattedPrice() }}</p>
      @if (!product.inStock) {
        <p class="text-sm text-error">Rupture de stock</p>
      }
    </div>
  </a>
</div>
