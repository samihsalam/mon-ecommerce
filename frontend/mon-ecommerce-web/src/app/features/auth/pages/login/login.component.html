<main class="mx-auto max-w-md px-4 py-16">
  <h1 class="font-heading text-3xl text-text mb-8">Se connecter</h1>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <div class="mb-4">
      <label for="email" class="block mb-1 text-sm font-medium text-text">Email</label>
      <input
        id="email"
        type="email"
        formControlName="email"
        class="w-full rounded-card border border-border px-3 py-2"
        [attr.aria-describedby]="form.controls.email.invalid && form.controls.email.touched ? 'email-error' : null"
      />
      @if (form.controls.email.invalid && form.controls.email.touched) {
        <p id="email-error" class="mt-1 text-sm text-error">Veuillez saisir un email valide.</p>
      }
    </div>

    <div class="mb-6">
      <label for="password" class="block mb-1 text-sm font-medium text-text">Mot de passe</label>
      <input
        id="password"
        type="password"
        formControlName="password"
        class="w-full rounded-card border border-border px-3 py-2"
        [attr.aria-describedby]="form.controls.password.invalid && form.controls.password.touched ? 'password-error' : null"
      />
      @if (form.controls.password.invalid && form.controls.password.touched) {
        <p id="password-error" class="mt-1 text-sm text-error">Le mot de passe est requis.</p>
      }
    </div>

    <div class="mb-6 text-right">
      <a routerLink="/mot-de-passe-oublie" class="text-sm text-text underline">Mot de passe oublié ?</a>
    </div>

    @if (authStore.error()) {
      <p class="mb-4 text-sm text-error" role="alert">{{ authStore.error() }}</p>
    }

    <button
      type="submit"
      [disabled]="authStore.isLoading()"
      class="w-full rounded-button bg-text text-white py-2 font-semibold hover:bg-accent hover:text-text transition disabled:opacity-50"
    >
      {{ authStore.isLoading() ? 'Connexion en cours…' : 'Se connecter' }}
    </button>
  </form>
</main>
